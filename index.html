<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SEBATIPS BRASILEIRÃO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #22c55e;
}

.container {
  padding: 15px;
}

.match {
  background: #111827;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
}

.team {
  width: 40%;
}

.vs {
  color: #64748b;
}

.picks {
  margin-top: 10px;
}

.pick {
  background: #22c55e;
  color: black;
  padding: 8px;
  border-radius: 6px;
  margin-top: 5px;
  font-weight: bold;
}

.section {
  margin-top: 20px;
}

.section h2 {
  color: #22c55e;
}

.vip {
  background: linear-gradient(45deg, #22c55e, #16a34a);
  color: black;
  text-align: center;
  padding: 15px;
  border-radius: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>⚽ SEBATIPS BRASILEIRÃO</header>

<div class="container">

  <div class="match">
    <div class="teams">
      <div class="team">Flamengo</div>
      <div class="vs">VS</div>
      <div class="team">Palmeiras</div>
    </div>

    <div class="picks">
      <div class="pick">Over 2.5 gols</div>
      <div class="pick">+9 escanteios</div>
    </div>
  </div>

  <div class="match">
    <div class="teams">
      <div class="team">Corinthians</div>
      <div class="vs">VS</div>
      <div class="team">Grêmio</div>
    </div>

    <div class="picks">
      <div class="pick">Ambas marcam</div>
      <div class="pick">+8 escanteios</div>
    </div>
  </div>

  <div class="section">
    <h2>📊 Classificação</h2>
    <p>1º Flamengo</p>
    <p>2º Palmeiras</p>
  </div>

  <div class="section">
    <h2>⚽ Artilharia</h2>
    <p>Pedro - 10 gols</p>
  </div>

  <div class="section">
    <div class="vip">
      🔐 ENTRE NO VIP (TELEGRAM)
    </div>
  </div>

</div>

</body>
</html>
